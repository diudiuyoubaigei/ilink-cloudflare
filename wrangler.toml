name = "ilink-cloudflare"
main = "src/index.ts"
compatibility_date = "2026-03-26"

[vars]
ILINK_BASE_URL = "https://ilinkai.weixin.qq.com"
KEEPALIVE_ENABLED = "true"
KEEPALIVE_INTERVAL_HOURS = "24"
KEEPALIVE_TEXT = "【保活提醒】请和微信 ClawBot 进行一次交互，保持 iLink 上下文可用。"

[triggers]
crons = ["*/15 * * * *"]

# 替换为你自己的 D1 数据库 ID。
[[d1_databases]]
binding = "DB"
database_name = "ilink-cloudflare"
database_id = "11e5fde6-8829-4ad9-b6dd-d36d8425ad2b"
migrations_dir = "migrations"

# 替换为你自己的队列名。
[[queues.producers]]
binding = "NOTIFICATION_QUEUE"
queue = "ilink-notification-queue"

[[queues.consumers]]
queue = "ilink-notification-queue"
max_batch_size = 10
max_batch_timeout = 5
max_retries = 3

